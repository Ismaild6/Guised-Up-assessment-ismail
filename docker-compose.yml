services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: guisedup
      POSTGRES_USER: guisedup
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  embedding:
    build: ./embedding-service
    ports:
      - "8001:8001"
    environment:
      USE_MOCK: "false"

volumes:
  pgdata:
